<!doctype html>
<html lang="es-MX">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Página no encontrada | Barberia.mx</title>
  <link rel="stylesheet" href="/css/style.css">
  <meta name="robots" content="noindex, nofollow">

  <!-- Favicon -->
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: var(--space-xl);
    }

    .error-code {
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: var(--font-bold);
      color: var(--color-gray-100);
      line-height: 1;
      margin-bottom: var(--space-md);
    }

    .error-title {
      font-size: var(--text-2xl);
      font-weight: var(--font-semibold);
      color: var(--color-black);
      margin-bottom: var(--space-sm);
    }

    .error-description {
      font-size: var(--text-base);
      color: var(--color-gray-500);
      max-width: 400px;
      margin-bottom: var(--space-xl);
    }

    .error-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: var(--space-sm);
      margin-bottom: var(--space-2xl);
    }

    .error-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      padding: var(--space-md) var(--space-lg);
      font-size: var(--text-sm);
      font-weight: var(--font-semibold);
      border-radius: var(--radius-full);
      text-decoration: none;
      transition: all var(--transition-fast);
    }

    .error-btn-primary {
      background: var(--color-black);
      color: var(--color-white);
    }

    .error-btn-primary:hover {
      background: var(--color-gray-800);
    }

    .error-btn-secondary {
      background: var(--color-white);
      color: var(--color-gray-700);
      border: 1px solid var(--color-gray-200);
    }

    .error-btn-secondary:hover {
      border-color: var(--color-gray-400);
      color: var(--color-black);
    }

    .error-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: var(--space-md);
    }

    .error-link {
      font-size: var(--text-sm);
      color: var(--color-gray-500);
      text-decoration: none;
      transition: color var(--transition-fast);
    }

    .error-link:hover {
      color: var(--color-accent);
    }

    .error-logo {
      position: absolute;
      top: var(--space-lg);
      left: var(--space-lg);
      font-size: var(--text-xl);
      font-weight: var(--font-bold);
      color: var(--color-black);
      text-decoration: none;
    }

    .error-logo-accent {
      color: var(--color-accent);
    }
  </style>
</head>

<body>

  <a href="/" class="error-logo">barberia<span class="error-logo-accent">.mx</span></a>

  <div class="error-page">
    <div class="error-code">404</div>
    <h1 class="error-title">Pagina no encontrada</h1>
    <p class="error-description">
      Lo sentimos, la pagina que buscas no existe o ha sido movida a otra ubicacion.
    </p>

    <div class="error-actions">
      <a href="/" class="error-btn error-btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Ir al inicio
      </a>
      <a href="/blog.html" class="error-btn error-btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
        Leer el blog
      </a>
    </div>

    <div class="error-links">
      <a href="/zona.html" class="error-link">Explorar estados</a>
      <a href="/ciudad-de-mexico/" class="error-link">Ciudad de Mexico</a>
      <a href="/blog.html" class="error-link">Blog</a>
      <a href="/#registro" class="error-link">Registrar barberia</a>
    </div>
  </div>

</body>

</html>
